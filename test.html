<!DOCTYPE html>
<html>
    <head>
        <title>Live Chat</title>
        <link rel="stylesheet" href="./src/styles/style.css">
    </head>
<body>
    <nav class="Sidebar">
        <h1>Hello</h1>
    </nav>
    <main>
        <div class="ChatDiv">
          <p>Messages</p>
        </div>
        
        <!-- Wrap input and button in a container -->
        <div class="input-container">
            <input aria-label="Message Input Box" type="text" id="MessageInput" placeholder="Type your message">
            <button aria-label="Send Message button" id="SendButton">Send Your Message</button>
        </div>
    </main>
</body>
</html>
